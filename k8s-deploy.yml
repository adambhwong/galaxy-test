---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: galaxy-test
  labels:
    app: galaxy-test
spec:
  selector:
    matchLabels:
      app: galaxy-test
  template:
    metadata:
      labels:
        app: galaxy-test
    spec:
      containers:
      - name: galaxy-test
        image: ghcr.io/adambhwong/galaxy-test:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: galaxy-test-service
spec:
  selector:
    app: galaxy-test
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 5000
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: galaxy-test-ingress
spec:
  rules:
    - host: galaxy-test.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: galaxy-test-service
                port:
                  number: 8080

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: galaxy-test-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: galaxy-test
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

